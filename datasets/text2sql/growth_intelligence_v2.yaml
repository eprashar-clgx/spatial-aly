                  expression: jurisdiction_county_code
            description: "Some counties use this instead of municipality codes."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: town_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: town_code
            description: "Some counties use this instead of municipality codes."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: situs_core_based_statistical_area_cbsa
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: situs_core_based_statistical_area_cbsa
            description: "Core Based Statistical Area (CBSA) code as designated by U.S. OMB."
            ai_context:
              synonyms:
                - "cbsa"
                - "metro area"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: cbsa_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cbsa_type
            description: "Type of CBSA: Metropolitan or Micropolitan Area."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "value_groups": {
                      "metropolitan": {"description": "Metropolitan Area", "codes": ["Metropolitan"]},
                      "micropolitan": {"description": "Micropolitan Area", "codes": ["Micropolitan"]}
                    }
                  }

          # ============================================================
          # PARCEL ESSENTIALS CENTROID POINT
          # NOTE: dictionary descriptions for lon/lat appear swapped, and values
          # are described as "millionths of degrees" (likely integer-scaled).
          # See adversarial review. srid 4326 per EPSG:4326 reference.
          # ============================================================

          - name: parcel_centroid_longitude
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parcel_centroid_longitude
            description: >
              EPSG:4326 longitude of the parcel centroid (a point that falls inside the parcel).
              Dictionary states "millionths of degrees" - confirm whether stored as integer
              micro-degrees (divide by 1,000,000) or true decimal degrees.
            ai_context:
              synonyms:
                - "longitude"
                - "lon"
                - "lng"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "FLOAT64", "geo_role": "lat_lon_pair", "paired_with": "parcel_centroid_latitude", "srid": 4326}'

          - name: parcel_centroid_latitude
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parcel_centroid_latitude
            description: >
              EPSG:4326 latitude of the parcel centroid (a point that falls inside the parcel).
              Centroid may not fall inside irregular parcels. Confirm decimal vs. micro-degree encoding.
            ai_context:
              synonyms:
                - "latitude"
                - "lat"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "FLOAT64", "geo_role": "lat_lon_pair", "paired_with": "parcel_centroid_longitude", "srid": 4326}'

          - name: parcel_centroid_geohash
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parcel_centroid_geohash
            description: >
              Geohash encoding of the centroid latitude/longitude. Informational only - NOT a
              renderable geometry; do not set geo_role. Useful for approximate bucketing/clustering.
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          # ============================================================
          # GROWTH PARCEL POLYGON IDENTIFIERS V2
          # ============================================================

          - name: parcel_shape_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parcel_shape_id
            description: "Unique and persistent identification number assigned to each parcel shape."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: state_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: state_code
            description: "Two-digit state code (first two digits of FIPS code)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: cnty_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cnty_code
            description: "Three-digit county code (last three digits of FIPS code)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: apn1
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: apn1
            description: "Assessor's Parcel Number (parcel identification number)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: apn2
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: apn2
            description: "Alternate Assessor's Parcel Number (parcel identification number)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          # ============================================================
          # PARCEL ESSENTIALS GEOJSON
          # ============================================================

          - name: metadata_id_geojson
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: metadata_id_geojson
            description: "Unique data set identifier linking records to their relevant metadata entry (GeoJSON)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "internal": true}'

          - name: parcel_geometry_geojson
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parcel_geometry_geojson
            description: >
              Parcel geometry/coordinates in GeoJSON format. Same polygon as parcel_geometry_wkt
              in a different encoding. For spatial ops: ST_GEOGFROMGEOJSON(col). GeoJSON uses [lon, lat] order.
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "geo_role": "geometry", "srid": 4326, "encoding": "geojson", "geometry_type": "polygon"}'

          # ============================================================
          # PARCEL ESSENTIALS WKT
          # ============================================================

          - name: metadata_id_wkt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: metadata_id_wkt
            description: "Unique data set identifier linking records to their relevant metadata entry (WKT)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "internal": true}'

          - name: parcel_geometry_wkt
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: parcel_geometry_wkt
            description: >
              Parcel geometry/coordinates in WKT (Well-Known Text) format. Preferred geometry for
              map rendering. For spatial ops: ST_GEOGFROMTEXT(col).
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "geo_role": "geometry",
                    "srid": 4326,
                    "encoding": "wkt",
                    "geometry_type": "polygon",
                    "preferred_display_geometry": {
                      "table": "growth_intelligence_v2",
                      "column": "parcel_geometry_wkt",
                      "geometry_type": "polygon",
                      "reason": "Parcel polygon preferred over centroid point; GeoJSON column holds the same polygon in another encoding."
                    }
                  }

          # ============================================================
          # ACTION
          # ============================================================

          - name: record_action_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: record_action_indicator
            description: "System-generated indicator advising how to process records in delta files."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "internal": true,
                    "value_groups": {
                      "add": {"description": "ADD - customer will UPSERT", "codes": ["A"]},
                      "update": {"description": "UPDATE - customer will UPSERT", "codes": ["U"]},
                      "delete": {"description": "DELETE - customer will DELETE", "codes": ["D"]}
                    },
                    "note": "BLANK = no action (initial delivery or refresh files)"
                  }
