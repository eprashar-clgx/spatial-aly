              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_1_last_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_1_last_name
            description: "Last name of property owner - 1st occurrence."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_1_first_name_and_middle_initial
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_1_first_name_and_middle_initial
            description: "First name and middle initial of property owner - 1st occurrence."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_1_corporate_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_1_corporate_indicator
            description: "Indicates owner 1 is recognized as a corporation or business."
            custom_extensions:
