            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_house_number_2
            description: "The second set of numbers in a mailing address range."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_direction
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_direction
            description: "Direction found to the left of the mailing street name (pre-directional)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_street_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_street_name
            description: "Name or number of the street of the mailing address."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_mode
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_mode
            description: "Street type/designator to the right of the mailing street name."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_quadrant
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_quadrant
            description: "Quadrant to the right of Mailing Mode (post-directional)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_unit_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_unit_number
            description: "Unit or suite number of the mailing address."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_city
            description: "City associated with the mailing address."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: mailing_state
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_state
            description: "Two-letter USPS postal abbreviation for the mailing state."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: mailing_zip_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_zip_code
            description: "USPS ZIP for the mailing address; 5-digit or ZIP+4."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: mailing_carrier_route
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_carrier_route
            description: "Four-digit local mail carrier delivery-path code for the mailing address."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_street_address
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_street_address
            description: "Full mailing address excluding city/state/ZIP; may contain unparsed foreign addresses."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_care_of_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_care_of_name
            description: "Standardized parsed name for the person receiving mail on behalf of the owner."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: mailing_opt_out_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_opt_out_indicator
            description: "Y if the owner has asked the DMA not to be contacted by mail for solicitation."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "opt_out": {"description": "Owner opted out of mail solicitation", "codes": ["Y"]},
                      "ok": {"description": "No opt-out", "codes": ["N"]}
                    }
                  }

          # ============================================================
          # GROWTH LOCATION V3
          # ============================================================

          - name: census_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: census_id
            description: "Composite of Census Tract, Block Group, Block, and Block Suffix (US Census Bureau)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: range
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: range
            description: "Range portion of PLSS coordinates (east/west of a meridian in six-mile intervals)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: township
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: township
            description: "Township portion of PLSS coordinates (north/south of a meridian in six-mile intervals)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: section
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: section
            description: "Section portion of PLSS coordinates (1 square mile; 36 sections per township/range)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: quarter_section
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: quarter_section
            description: "Section divided into four sub-sections (NE, NW, SE, SW)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: municipality_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: municipality_name
            description: "Name of the municipality where the parcel is located."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: municipality_code
            expression:
