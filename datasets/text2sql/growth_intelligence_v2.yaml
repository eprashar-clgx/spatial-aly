                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "value_groups": {
                      "owner_occupied": {"description": "Owner occupied", "codes": ["M", "O", "S"]},
                      "absentee": {"description": "Absentee owner", "codes": ["A", "T"]}
