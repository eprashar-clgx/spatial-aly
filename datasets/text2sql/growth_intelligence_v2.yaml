# datasets/text2sql/growth_intelligence_v2.yaml
# OSI v0.1.1 with COTALITY vendor extension
# Source: {PROJECT}.{DATASET}.growth_intelligence_v2  (TODO: confirm project/dataset/physical table)
# Primary key: clip
# Generated by osi-yaml-gen from "Growth Intelligence_v2" data dictionary (version 2026-03-12)
version: "0.1.1"

semantic_model:
  - name: growth_intelligence_v2
    description: >
      Property-level growth intelligence for U.S. parcels keyed by CLIP. Combines growth
      indicators (new construction, land-use change, new CLIP, recent year built, building
      permits), growth stage/type classification, confidence-model scores, property
      characteristics, owner and mailing information, the most recent purchase transaction,
      location/census identifiers, and parcel geometry (centroid point plus polygon in WKT
      and GeoJSON).
    ai_context:
      synonyms:
        - "growth intelligence"
        - "parcel growth"
        - "property growth indicators"
      instructions: >
        One row per property, uniquely identified by `clip`. Use growth indicator flags
        (Y/N) together with their nearby "count" companions to find clusters of activity.
        Stage/type-of-growth and the anticipated-growth scores describe where a parcel is in
        its development lifecycle.

        Geometry: prefer the parcel polygon (`parcel_geometry_wkt`) for map rendering; the
        GeoJSON column holds the same polygon in a different encoding. `parcel_centroid_*`
        is a point that may fall outside irregular parcels. `parcel_centroid_geohash` is an
        informational encoding only — do NOT treat it as renderable geometry.

        Dates (e.g., `sale_date`, `sale_recording_date`) are stored as YYYYMMDD integers, not
        native DATE types — cast before date arithmetic.
    custom_extensions:
      - vendor_name: COTALITY
        data: |
          {
            "tags": ["growth-intelligence", "property-intel", "parcel"],
            "row_estimate": 0,
            "sample_questions": [
              {
                "id": 1,
                "bucket": "Growth Activity",
                "q": "How many properties in Travis County, TX had a recent new construction sale?",
                "context": "recent_new_construction_sale_indicator = 'Y'; filter by situs_state and situs_county or fips_county_code.",
                "sql": "SELECT COUNT(*) FROM growth_intelligence_v2 WHERE recent_new_construction_sale_indicator = 'Y' AND situs_state = 'TX' AND situs_county = 'TRAVIS'"
              },
              {
                "id": 2,
                "bucket": "Growth Stage",
                "q": "List parcels currently in the Ongoing Growth stage in ZIP 78701.",
                "context": "stage_of_growth describes lifecycle; filter by situs_zip_code.",
                "sql": "SELECT clip, situs_street_address, stage_of_growth FROM growth_intelligence_v2 WHERE stage_of_growth = 'Ongoing Growth' AND situs_zip_code LIKE '78701%'"
              },
              {
                "id": 3,
                "bucket": "Builder/Developer",
                "q": "Which builder/developer-owned parcels had a new construction building permit in the last two years?",
                "context": "builder_developer_ownership_indicator = 'Y' AND recent_new_construction_building_permit_indicator = 'Y'.",
                "sql": "SELECT clip, owner_1_full_name, new_construction_building_permit_effective_date FROM growth_intelligence_v2 WHERE builder_developer_ownership_indicator = 'Y' AND recent_new_construction_building_permit_indicator = 'Y'"
              }
            ]
          }

    datasets:
      - name: growth_intelligence_v2
        source: "{PROJECT}.{DATASET}.growth_intelligence_v2"
        primary_key: [clip]

        fields:
          # ============================================================
          # CLIP V2
          # ============================================================

          - name: clip
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: clip
            description: "Unique identification number assigned to each property (primary key)."
            ai_context:
              synonyms:
                - "clip"
                - "property id"
                - "corelogic property id"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "is_id": true}'

          # ============================================================
          # GROWTH INDICATORS V2
          # ============================================================

          - name: recent_new_construction_sale_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: recent_new_construction_sale_indicator
            description: "Most recent sale was within the past two years and identified as a new construction sale."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Recent new construction sale", "codes": ["Y"]},
                      "no": {"description": "No recent new construction sale", "codes": ["N"]}
                    }
                  }

          - name: recent_nearby_new_construction_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: recent_nearby_new_construction_count
            description: "Count of other properties within two miles with the New Construction Property Indicator set to Y."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          - name: land_use_change_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: land_use_change_indicator
            description: "Land use for the property has changed in the past two years."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Land use changed", "codes": ["Y"]},
                      "no": {"description": "No land use change", "codes": ["N"]}
                    }
                  }

          - name: land_use_change_indicator_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: land_use_change_indicator_count
            description: "Count of other properties within two miles with the Land Use Change Indicator set to Y."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          - name: previous_land_use_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: previous_land_use_code
            description: "Previous land use (LUSE code) if Land Use Change Indicator is set to Y."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "high_cardinality": true,
                    "values_hint": "CoreLogic LUSE land-use code table"
                  }

          - name: builder_developer_ownership_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: builder_developer_ownership_indicator
            description: "Set to Y if the owner is identified as a builder or a developer."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Owner is a builder/developer", "codes": ["Y"]},
                      "no": {"description": "Owner is not a builder/developer", "codes": ["N"]}
                    }
                  }

          - name: builder_developer_type_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: builder_developer_type_code
            description: "Categorizes builder/developer type (multi-family, single family, commercial). Reserved for future use."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "values_hint": "Reserved for future use - typically empty"}'

          - name: new_clip_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_clip_indicator
            description: "Indicates that the property received a CLIP in the past two years."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "New CLIP in past two years", "codes": ["Y"]},
                      "no": {"description": "Not a new CLIP", "codes": ["N"]}
                    }
                  }

          - name: new_clip_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_clip_count
            description: "Count of other properties within two miles with the New CLIP Indicator set to Y."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          - name: recent_year_built_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: recent_year_built_indicator
            description: "Indicates that the Year Built is less than three years ago."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Year built < 3 years ago", "codes": ["Y"]},
                      "no": {"description": "Not recently built", "codes": ["N"]}
                    }
                  }

          - name: recent_year_built_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: recent_year_built_count
            description: "Count of other properties within two miles with the Recent Year Built Indicator set."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          - name: recent_new_construction_building_permit_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: recent_new_construction_building_permit_indicator
            description: "A new construction building permit was issued for the property in the past two years."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Recent new construction permit", "codes": ["Y"]},
                      "no": {"description": "No recent permit", "codes": ["N"]}
                    }
                  }

          - name: new_construction_building_permit_effective_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: new_construction_building_permit_effective_date
            description: "Effective date of the new construction building permit (only populated when indicator = Y). Format: YYYYMMDD."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "filterable": true, "values_hint": "YYYYMMDD integer-encoded date"}'

          - name: recent_new_construction_building_permit_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: recent_new_construction_building_permit_count
            description: "Count of other properties within two miles with the Recent New Construction Building Permit Indicator set to Y."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          # ============================================================
          # STAGE AND TYPE OF GROWTH
          # ============================================================

          - name: type_of_growth
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: type_of_growth
            description: "Categorizes current land use into broader growth types (Single Family Residential, Commercial, Agricultural, etc.)."
            ai_context:
              synonyms:
                - "growth type"
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "values_hint": "e.g., Single Family Residential, Commercial, Agricultural"
                  }

          - name: stage_of_growth
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stage_of_growth
            description: "Lifecycle stage classification of the parcel."
            ai_context:
              synonyms:
                - "growth stage"
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "value_groups": {
                      "early_growth": {"description": "Evidence of land use change, builder/developer ownership, or new CLIP", "codes": ["Early Growth"]},
                      "ongoing_growth": {"description": "Evidence of a recent new construction building permit", "codes": ["Ongoing Growth"]},
                      "recently_completed_growth": {"description": "Evidence of a recent new construction sale or recent year built", "codes": ["Recently Completed Growth"]}
                    }
                  }

          - name: date_of_last_growth_stage_change
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_of_last_growth_stage_change
            description: "Date when the current growth stage first occurred. Format: YYYYMMDD."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "filterable": true, "values_hint": "YYYYMMDD integer-encoded date"}'

          - name: ownership_classification
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ownership_classification
            description: "Classifies property ownership into categories."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "value_groups": {
                      "private": {"description": "Private owner", "codes": ["Private"]},
                      "builder": {"description": "Builder", "codes": ["Builder"]},
                      "developer": {"description": "Developer", "codes": ["Developer"]},
                      "investor": {"description": "Investor", "codes": ["Investor"]},
                      "government": {"description": "Government", "codes": ["Government"]}
                    }
                  }

          # ============================================================
          # GROWTH STAGE CONFIDENCE MODEL
          # ============================================================

          - name: anticipated_early_growth_score
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: anticipated_early_growth_score
            description: "Predicts if and when a parcel will begin its Early Growth stage from a Non-Growth parcel state."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true, "values_hint": "2-char score code"}'

          - name: anticipated_construction_score
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: anticipated_construction_score
            description: "Predicts if and when a parcel will begin its Ongoing Development stage (construction start) from Early Growth."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true, "values_hint": "2-char score code"}'

          - name: anticipated_construction_completed_score
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: anticipated_construction_completed_score
            description: "Predicts if and when a parcel will enter its Completed Property stage from Ongoing Growth."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true, "values_hint": "2-char score code"}'

          - name: pre_growth_stage_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: pre_growth_stage_indicator
            description: "1 if anticipated_early_growth_score has a value (pre-growth potential), else 0."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "INT64",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Has pre-growth potential", "codes": ["1"]},
                      "no": {"description": "No pre-growth potential", "codes": ["0"]}
                    }
                  }

          # ============================================================
          # PROPERTY ID V3
          # ============================================================

          - name: corelogic_county_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: corelogic_county_code
            description: "CoreLogic-defined persistent 5-digit code uniquely identifying every county or county equivalent."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: apn_parcel_number_unformatted
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: apn_parcel_number_unformatted
            description: "Assessor's Parcel Number in unformatted form; often used as a unique key by counties."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: apn_sequence_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: apn_sequence_number
            description: "Internal sequence number used to ensure uniqueness of the APN."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "internal": true}'

          - name: composite_property_linkage_key
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: composite_property_linkage_key
            description: "Unique property key to link to other legacy files. Fixed-width; APN component padded to 45 chars."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: fips_county_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: fips_county_code
            description: "Current 5-digit FIPS code uniquely defining every county or county equivalent."
            ai_context:
              synonyms:
                - "fips"
                - "county fips"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          - name: original_apn
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: original_apn
            description: "Original APN in raw format from the assessor tax roll; used if a county renumbers parcel IDs."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: tax_account_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: tax_account_number
            description: "County/source number used primarily for billing; typically unique to a tax bill, not a parcel."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: online_formatted_parcel_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: online_formatted_parcel_id
            description: "APN formatted to link to CoreLogic online products."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: alternate_parcel_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: alternate_parcel_id
            description: "Alternate ID provided by some counties to identify a property."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          # ============================================================
          # GROWTH PROPERTY V3
          # ============================================================

          - name: land_use_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: land_use_code
            description: "CoreLogic LUSE land-use code converted from county codes to aid search/extract."
            ai_context:
              synonyms:
                - "land use"
                - "luse"
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "high_cardinality": true,
                    "related_description_column": "county_land_use_description",
                    "values_hint": "CoreLogic LUSE code table"
                  }

          - name: county_land_use_description
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: county_land_use_description
            description: "Text description of the county-level land use associated with the County Land Use Code."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: state_land_use_description
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: state_land_use_description
            description: "Text description of the state-level land use associated with the State Land Use Code."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: manufactured_home_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: manufactured_home_indicator
            description: "Y if a manufactured home is present on the parcel."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Manufactured home present", "codes": ["Y"]},
                      "no": {"description": "No manufactured home", "codes": ["N"]}
                    }
                  }

          - name: zoning_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: zoning_code
            description: "County/local established zoning code (not converted by CoreLogic)."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "high_cardinality": true,
                    "related_description_column": "zoning_code_description"
                  }

          - name: zoning_code_description
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: zoning_code_description
            description: "County-provided zoning code description of allowable land use."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: property_indicator_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: property_indicator_code
            description: "CoreLogic general code (PRIND) for property type (e.g., Single Family Residence, Condominium, Commercial)."
            ai_context:
              synonyms:
                - "property type"
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "filterable": true,
                    "values_hint": "CoreLogic PRIND code table"
                  }

          - name: number_of_buildings
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: number_of_buildings
            description: "Total number of buildings on the parcel."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          - name: address_count
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: address_count
            description: "Count of unique addresses associated with the property."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true}'

          - name: year_built
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: year_built
            description: "Year of construction (or effective year built); most recent if multiple structures."
            ai_context:
              synonyms:
                - "year built"
                - "construction year"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "filterable": true, "unit": "year"}'

          # ============================================================
          # PROPERTY SIZE V3
          # ============================================================

          - name: front_footage
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: front_footage
            description: "Linear feet across the front of the lot, facing the street."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "FLOAT64", "is_metric": true, "unit": "ft"}'

          - name: depth_footage
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: depth_footage
            description: "Linear feet between the front and back of the lot."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "FLOAT64", "is_metric": true, "unit": "ft"}'

          - name: total_number_of_acres
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: total_number_of_acres
            description: "CoreLogic-derived or county-provided total acreage of the parcel."
            ai_context:
              synonyms:
                - "acreage"
                - "acres"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "FLOAT64", "is_metric": true, "unit": "acres"}'

          - name: total_land_square_footage
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: total_land_square_footage
            description: "Total land mass in square feet."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "is_metric": true, "unit": "sqft"}'

          - name: easement_type_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: easement_type_code
            description: "County-provided code/value describing easement(s) on the property (e.g., 2 = Flood Control Easement)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING", "filterable": true}'

          # ============================================================
          # PROPERTY ADDRESS V2 (situs)
          # ============================================================

          - name: situs_house_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: situs_house_number
            description: "Digits found to the left of the street name."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: situs_house_number_suffix
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: situs_house_number_suffix
            description: "Characters immediately right of a house number (e.g., 202B Jones Rd)."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: situs_house_number_2
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: situs_house_number_2
            description: "The second set of numbers in an address range."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: situs_direction
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: situs_direction
            description: "Direction found to the left of the street name (pre-directional)."
            custom_extensions:
              - vendor_name: COTALITY
