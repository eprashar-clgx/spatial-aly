                  {
                    "data_type": "STRING",
                    "value_groups": {
                      "et_al": {"description": "ET AL - and others", "codes": ["A"]},
                      "et_con": {"description": "ET CON - and husband", "codes": ["C"]},
                      "et_ux": {"description": "ET UX - and wife", "codes": ["U"]},
                      "et_vir": {"description": "ET VIR - and husband", "codes": ["V"]}
