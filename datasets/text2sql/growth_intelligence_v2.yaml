            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_2_last_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_2_last_name
            description: "Additional owner last name if more than one entity owns the property."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_2_first_name_and_middle_initial
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_2_first_name_and_middle_initial
            description: "Additional owner first name and middle initial if more than one entity owns the property."
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "STRING"}'

          - name: owner_2_corporate_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: owner_2_corporate_indicator
            description: "Indicates owner 2 is recognized as a corporation or business."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Corporate/business owner", "codes": ["Y"]},
                      "no": {"description": "Individual owner", "codes": ["N"]}
                    }
                  }

          - name: owner_etal_code
            expression:
              dialects:
