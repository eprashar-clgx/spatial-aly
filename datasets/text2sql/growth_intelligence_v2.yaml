            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "INT64",
                    "is_flag": true,
                    "value_groups": {
                      "vacant": {"description": "Yes - exclude from data/products", "codes": ["1"]},
                      "not_vacant": {"description": "No exclusion", "codes": ["0"]}
                    }
                  }

          # ============================================================
          # GROWTH OWNER V4
          # ============================================================

          - name: owner_1_full_name
