          - name: sale_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: sale_date
            description: "Date the deed was prepared. Missing day/month filled with 00. Format: YYYYMMDD."
            ai_context:
              synonyms:
                - "sale date"
            custom_extensions:
              - vendor_name: COTALITY
                data: '{"data_type": "INT64", "filterable": true, "values_hint": "YYYYMMDD integer-encoded date; day/month may be 00"}'

