                data: |
                  {
                    "data_type": "STRING",
                    "is_flag": true,
                    "filterable": true,
                    "value_groups": {
                      "yes": {"description": "Corporate/business owner", "codes": ["Y"]},
                      "no": {"description": "Individual owner", "codes": ["N"]}
                    }
                  }

          - name: owner_2_full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
