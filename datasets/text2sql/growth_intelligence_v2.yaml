            description: "USPS delivery point validation (DPV) code used for CASS certification."
            custom_extensions:
              - vendor_name: COTALITY
                data: |
                  {
                    "data_type": "STRING",
                    "value_groups": {
                      "confirmed_full": {"description": "DPV confirmed for primary and secondary numbers", "codes": ["Y"]},
                      "primary_only_missing_secondary": {"description": "Primary confirmed, secondary missing", "codes": ["D"]},
                      "primary_only_unconfirmed_secondary": {"description": "Primary confirmed, secondary present but unconfirmed", "codes": ["S"]},
                      "not_confirmed": {"description": "Primary and secondary failed DPV", "codes": ["N"]}
                    },
                    "note": "Blank = address not presented to hash table"
                  }

          - name: mailing_delivery_point_validation_vacant_indicator
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: mailing_delivery_point_validation_vacant_indicator
